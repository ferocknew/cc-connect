name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release (${{ matrix.display }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            display: macOS ARM64
          - goos: darwin
            goarch: amd64
            display: macOS Intel
          - goos: linux
            goarch: amd64
            display: Linux x64
          - goos: linux
            goarch: arm64
            display: Linux ARM64
          - goos: windows
            goarch: amd64
            display: Windows x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download
        env:
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NO_V=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=$VERSION_NO_V" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          VERSION_NO_V: ${{ steps.version.outputs.VERSION_NO_V }}
          COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          set -x
          echo "=== Building for ${{ matrix.display }} ==="

          BINARY_NAME="cc-connect"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="cc-connect.exe"
          fi

          OUTPUT_NAME="cc-connect-${VERSION_NO_V}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi

          LDFLAGS="-s -w \
            -X main.version=${VERSION} \
            -X main.commit=${COMMIT} \
            -X main.buildTime=${BUILD_TIME}"

          go build -ldflags "$LDFLAGS" -o "$OUTPUT_NAME" ./cmd/cc-connect
          ls -lh "$OUTPUT_NAME"

          # 打包
          if [ "$GOOS" = "windows" ]; then
            zip "${OUTPUT_NAME}.zip" "$OUTPUT_NAME"
            echo "Created: ${OUTPUT_NAME}.zip"
            ls -lh "${OUTPUT_NAME}.zip"
          else
            tar czf "${OUTPUT_NAME}.tar.gz" "$OUTPUT_NAME"
            echo "Created: ${OUTPUT_NAME}.tar.gz"
            ls -lh "${OUTPUT_NAME}.tar.gz"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.goos == 'windows' && 'cc-connect-*.zip' || 'cc-connect-*.tar.gz' }}
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
